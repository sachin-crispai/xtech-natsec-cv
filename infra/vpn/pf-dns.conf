# pf rules — SIERRA VPN translation + demo DMZ security
#
# WHY the pass-127.0.0.1 rule is needed:
#   After the rdr redirect, DNS packets have dst=127.0.0.1:5301 (not 10.9.0.1:53).
#   The "block all" rule would kill them. Must explicitly pass dst=127.0.0.1
#   BEFORE the block — this is safe because 127.0.0.1 is only reachable via rdr.
#
# TRANSLATION — redirect DNS queries to correct dnsmasq instance
rdr pass on utun8 proto udp from any to 10.8.0.1 port 53 -> 127.0.0.1 port 5300
rdr pass on utun9 proto udp from any to 10.9.0.1 port 53 -> 127.0.0.1 port 5301

# FILTER — demo DMZ: allow only gallery (port 80) + redirected DNS (127.0.0.1)
pass  in quick on utun9 proto udp from 10.9.0.0/24 to 127.0.0.1
pass  in quick on utun9 proto tcp from 10.9.0.0/24 to 10.9.0.1 port 80
block in quick on utun9 from 10.9.0.0/24 to any

# pf NAT rule — redirect VPN client DNS to dnsmasq
# VPN clients use DNS = 10.8.0.1 (WireGuard config)
# Packets arrive on utun8 → pf redirects to dnsmasq:5300
# Note: rdr rules only apply to packets arriving ON the interface,
#       not to local machine queries (this is correct/expected behavior)

rdr pass on utun8 proto udp from any to 10.8.0.1 port 53 -> 127.0.0.1 port 5300

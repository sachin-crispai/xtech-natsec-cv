# pf NAT — redirect VPN DNS queries to correct dnsmasq instance
# utun8 (operators, port 51820) → dnsmasq:5300 — natsec returns 10.0.0.66
# utun9 (demo DMZ, port 51821)  → dnsmasq:5301 — natsec returns 10.9.0.1

rdr pass on utun8 proto udp from any to 10.8.0.1 port 53 -> 127.0.0.1 port 5300
rdr pass on utun9 proto udp from any to 10.9.0.1 port 53 -> 127.0.0.1 port 5301

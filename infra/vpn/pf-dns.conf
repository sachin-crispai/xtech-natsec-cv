# pf rules for SIERRA VPN — translation + demo DMZ security
#
# TRANSLATION: redirect DNS queries to correct dnsmasq instance
rdr pass on utun8 proto udp from any to 10.8.0.1 port 53 -> 127.0.0.1 port 5300
rdr pass on utun9 proto udp from any to 10.9.0.1 port 53 -> 127.0.0.1 port 5301

# FILTER: demo DMZ clients (10.9.0.0/24) restricted to port 80 only
# This prevents demo clients from reaching SSH (22), SMB (445), etc.
# UDP is blocked entirely (except DNS which is handled by rdr above)
# Operators (10.8.0.0/24) are trusted — no restrictions
block in quick on utun9 proto tcp from 10.9.0.0/24 to any port != 80
block in quick on utun9 proto udp from 10.9.0.0/24 to any
pass  in quick on utun9 proto tcp from 10.9.0.0/24 to 10.9.0.1 port 80

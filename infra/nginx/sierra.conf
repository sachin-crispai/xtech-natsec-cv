# SIERRA — customer-facing authenticated gallery
# Only reachable from the SIERRA hotspot subnet (192.168.2.0/24)
# Requires valid credentials from .sierra-auth password file

server {
    listen       80;
    server_name  tahoe tahoe.local tahoe.sierra 192.168.2.1;

    # ── Layer 1: Network isolation ─────────────────────────────────────────
    # Only SIERRA subnet and loopback are allowed — all other IPs refused
    allow 192.168.2.0/24;
    allow 127.0.0.1;
    deny  all;

    # Redirect bare root → /gallery/
    location = / {
        return 301 /gallery/;
    }

    # ── Layer 2: Authenticated gallery ─────────────────────────────────────
    location /gallery/ {
        auth_basic           "SIERRA — Authorized Access Only";
        auth_basic_user_file /usr/local/etc/nginx/.sierra-auth;

        alias  /Volumes/WORK900_CRISPAI/810-26-NATSEC-CV/platform/collection/view/;
        index  index.html;
        autoindex off;

        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
    }

    # Block all other paths
    location / {
        return 403;
    }
}

server {
    listen       80;
    # LAN hostnames + hotspot hostnames (xcasa resolves via dnsmasq on natsec hotspot)
    server_name  mamba.local localhost 10.0.0.66
                 xcasa xcasa.local 192.168.2.1
                 natsec natsec.sierra
                 tahoe tahoe.sierra tahoe.local
                 mamba mamba.sierra
                 gallery.sierra
                 10.8.0.1 10.9.0.1;   # VPN gateway IPs — operators + demo

    # Redirect bare root and /natsec (no trailing slash) → /natsec/
    location = / {
        return 301 /natsec/;
    }

    location = /natsec {
        return 301 /natsec/;
    }

    location /natsec/ {
        alias /Volumes/WORK900_CRISPAI/810-26-NATSEC-CV/platform/collection/view/;
        index index.html;
        autoindex off;

        # No caching — photos change frequently during active sessions
        add_header Cache-Control "no-cache, must-revalidate";

    }
}

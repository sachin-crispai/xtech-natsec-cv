server {
    listen       80;

    server_name  mamba.local
                 localhost
                 10.0.0.66
                 xcasa xcasa.local
                 192.168.2.1
                 natsec natsec.sierra
                 tahoe tahoe.sierra tahoe.local
                 mamba mamba.sierra
                 gallery.sierra
                 10.8.0.1
                 10.9.0.1;

    location = / {
        return 301 /natsec/;
    }

    location = /natsec {
        return 301 /natsec/;
    }

    location /natsec/ {
        alias /Volumes/WORK900_CRISPAI/810-26-NATSEC-CV/platform/collection/view/;
        index index.html;
        autoindex off;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}

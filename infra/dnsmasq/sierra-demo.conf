# dnsmasq — Demo DMZ DNS (port 5301)
# Started by vpn-start.sh for the demo VPN (utun9)
# pf redirects 10.9.0.1:53 → 127.0.0.1:5301
#
# IMPORTANT: --no-hosts required — /etc/hosts has natsec=10.0.0.66
# (added for operator LAN DNS). Without --no-hosts, /etc/hosts
# takes precedence and demo clients get 10.0.0.66 which is outside
# their AllowedIPs (10.9.0.0/24), so the name resolves but never connects.
#
# Demo users can ONLY reach 10.9.0.0/24 via VPN.
# All names here resolve to 10.9.0.1 (the demo DMZ gateway).

port=5301
listen-address=127.0.0.1
no-hosts
no-resolv

address=/natsec/10.9.0.1
address=/natsec.sierra/10.9.0.1
address=/tahoe/10.9.0.1
address=/tahoe.sierra/10.9.0.1
address=/gallery.sierra/10.9.0.1
address=/mamba/10.9.0.1

server=8.8.8.8
server=1.1.1.1

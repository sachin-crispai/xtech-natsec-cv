# dnsmasq — SIERRA VPN DNS resolver
# Listens on 127.0.0.1:5300
# pf redirects VPN client queries (10.8.0.1:53 on utun8) to this port

port=5300
listen-address=127.0.0.1
bind-interfaces

# Own the sierra domain
local=/sierra/
domain=sierra

# ── Gallery / natsec names → TAHOE (10.0.0.66) ────────────────────────────────
address=/natsec/10.0.0.66
address=/natsec.sierra/10.0.0.66
address=/tahoe/10.0.0.66
address=/tahoe.local/10.0.0.66
address=/tahoe.sierra/10.0.0.66
address=/gallery.sierra/10.0.0.66
address=/mamba/10.0.0.66
address=/mamba.sierra/10.0.0.66

# Upstream for everything else
server=8.8.8.8
server=1.1.1.1

log-facility=/usr/local/var/log/dnsmasq-sierra.log

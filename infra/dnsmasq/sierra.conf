# dnsmasq config for SIERRA customer network
# Resolves 'tahoe' and 'tahoe.sierra' to the TAHOE rig gateway
# so customers can open http://tahoe/gallery/ on their phones

interface=bridge100
bind-interfaces

# Resolve 'tahoe' → TAHOE rig on SIERRA network
address=/tahoe/192.168.2.1
address=/tahoe.local/192.168.2.1
address=/tahoe.sierra/192.168.2.1

# Forward all other DNS upstream
server=8.8.8.8
server=1.1.1.1

no-dhcp-interface=bridge100

log-queries
log-facility=/usr/local/var/log/dnsmasq-sierra.log

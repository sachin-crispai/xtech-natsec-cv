# dnsmasq config for natsec hotspot
# Listens on the Internet Sharing bridge (192.168.2.1)
# Resolves 'xcasa' and 'xcasa.local' to the Mac gateway
# so connected devices can open http://xcasa/natsec/

# Only listen on the hotspot bridge interface — never on en0/WAN
interface=bridge100
bind-interfaces

# Resolve xcasa → Mac gateway IP on hotspot network
address=/xcasa/192.168.2.1
address=/xcasa.local/192.168.2.1

# Also resolve mamba and mamba.local (existing hostname)
address=/mamba/192.168.2.1
address=/mamba.local/192.168.2.1

# Forward everything else to the upstream DNS (router)
server=8.8.8.8
server=1.1.1.1

# DHCP range for hotspot clients (macOS handles this via bootpd,
# but dnsmasq can supplement DNS — leave DHCP to macOS)
no-dhcp-interface=bridge100

# Logging
log-queries
log-facility=/usr/local/var/log/dnsmasq-natsec.log
